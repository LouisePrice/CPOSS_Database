<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CPOSS Database — Case Index</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #202124;
      --muted: #5f6368;
      --line: #d8dce1;
      --header: #f3f5f7;
      --accent: #1558a6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: #fff;
      font: 16px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main { width: min(1120px, calc(100% - 2rem)); margin: 3rem auto; }
    h1 { margin: 0 0 .25rem; font-size: clamp(1.8rem, 4vw, 2.5rem); line-height: 1.2; }
    .summary { margin: 0 0 1.5rem; color: var(--muted); }
    .resource-links { display: flex; flex-wrap: wrap; gap: .65rem; margin: .75rem 0 1.5rem; }
    .resource-link {
      display: inline-block;
      padding: .65rem .9rem;
      border-radius: .35rem;
      color: #fff;
      background: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }
    .resource-link:hover { background: #0f4788; }
    label { display: block; margin-bottom: .35rem; font-weight: 600; }
    input {
      width: 100%;
      margin-bottom: 1.25rem;
      padding: .7rem .85rem;
      border: 1px solid #aeb4bb;
      border-radius: .35rem;
      font: inherit;
    }
    input:focus { outline: 3px solid #c8ddf5; border-color: var(--accent); }
    .table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: .45rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: .65rem .8rem; border-bottom: 1px solid var(--line); text-align: left; }
    th { position: sticky; top: 0; background: var(--header); font-size: .9rem; }
    tbody tr:last-child td { border-bottom: 0; }
    tbody tr:hover { background: #f8fafc; }
    a { color: var(--accent); font-weight: 600; text-decoration-thickness: .08em; }
    .molecule-structure{width:10rem;text-align:center;vertical-align:middle}
    .molecule-structure img{display:block;max-width:9rem;max-height:7rem;width:auto;height:auto;margin:auto;object-fit:contain}
    .viz { display: block; width: max-content; max-width: 24rem; overflow-wrap: anywhere; }
    .viz + .viz { margin-top: .25rem; }
    .unavailable { color: var(--muted); }
    .number { width: 4.5rem; color: var(--muted); text-align: right; }
    .empty { display: none; padding: 1rem; color: var(--muted); }
  </style>
</head>
<body>
  <main>
    <h1>CPOSS Database</h1>
    <p class="summary"><span id="visible-count">193</span> of 193 cases</p>
    <nav class="resource-links" aria-label="CPOSS resources">
      <a class="resource-link" href="https://www.chem.ucl.ac.uk/cposs/results/databasenotes.html" target="_blank" rel="noopener">Open CPOSS Website</a>
      <a class="resource-link" href="$NAVIGATOR" target="_blank" rel="noopener">Open CPOSS Landscape Explorer</a>
      <a class="resource-link" href="$DATASET/contributors.html" target="_blank" rel="noopener">View Contributor Statistics</a>
    </nav>
    <label for="case-filter">Search cases</label>
    <input id="case-filter" type="search" placeholder="Type a case or folder name…" autocomplete="off">
    <script>
      const navigator_location = "https://mme-ucl.github.io/CPOSS_landscape_explorer/navigator.html";
      const dataset_location = "https://louiseprice.github.io/CPOSS_Database/";

      document.addEventListener("DOMContentLoaded", () => {
        const datasetBase = dataset_location.endsWith("/") ? dataset_location : `${dataset_location}/`;
        for (const anchor of document.querySelectorAll("a[href]")) {
          const href = anchor.getAttribute("href");
          if (!href) continue;
          if (href.startsWith("$NAVIGATOR")) {
            anchor.href = href.replace("$NAVIGATOR", navigator_location);
            continue;
          }
          if (href.startsWith("$DATASET/")) {
            anchor.href = href.replace("$DATASET/", datasetBase);
          }
        }
      });
    </script>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th class="number">#</th><th>Case</th><th>Molecular structure</th><th>Interactive visualization</th></tr>
        </thead>
        <tbody id="case-list">
        </tbody>
      </table>
      <div id="empty" class="empty">No matching cases.</div>
    </div>
  </main>
  <script>
    const input = document.getElementById("case-filter");
    const rows = [...document.querySelectorAll("#case-list tr")];
    const count = document.getElementById("visible-count");
    const empty = document.getElementById("empty");
    input.addEventListener("input", () => {
      const query = input.value.trim().toLocaleLowerCase();
      let visible = 0;
      for (const row of rows) {
        const show = row.textContent.toLocaleLowerCase().includes(query);
        row.hidden = !show;
        if (show) visible++;
      }
      count.textContent = visible;
      empty.style.display = visible ? "none" : "block";
    });
  </script>
</body>
</html>
